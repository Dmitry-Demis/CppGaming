<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/gamification.css">
    <link rel="stylesheet" href="css/achievements.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body class="achievements-page landing-page">

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="header-logo">
                <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="20" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
                    <path d="M10 10 L10 18 M10 14 L14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M18 10 L18 18 M18 14 L22 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Курс C++
            </a>
            <nav class="header-nav">
                <a href="index.html">Главная</a>
                <a href="theory/chapter-1/fundamental-types/introduction-to-fundamental-data-types.html">Глава I</a>
                <a href="achievements.html" class="active">🏆 Достижения</a>
                <a href="register.html">Регистрация</a>
                <a href="login.html" id="navAuthLink">Вход</a>
            </nav>
            <button class="mobile-menu-btn" aria-label="Открыть меню">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="page-wrapper">
        <main class="main-content">

            <div class="ach-page-header">
                <h1>🏆 <span class="text-gradient">Достижения</span></h1>
                <p>Отслеживайте прогресс и получайте награды</p>
            </div>

            <!-- Stats -->
            <div class="ach-stats-bar">
                <div class="ach-stat">
                    <div class="ach-stat-value" id="ach-unlocked-count">0</div>
                    <div class="ach-stat-label">Получено</div>
                </div>
                <div class="ach-stat">
                    <div class="ach-stat-value" id="ach-total-count">0</div>
                    <div class="ach-stat-label">Всего</div>
                </div>
                <div class="ach-stat">
                    <div class="ach-stat-value" id="ach-coins-earned">0</div>
                    <div class="ach-stat-label">Монет заработано</div>
                </div>
                <div class="ach-stat">
                    <div class="ach-stat-value" id="ach-pct">0%</div>
                    <div class="ach-stat-label">Прогресс</div>
                </div>
            </div>

            <!-- Groups rendered by JS -->
            <div id="ach-groups-container"></div>

        </main>
    </div>

    <footer class="site-footer">
        <p>Интерактивный курс по языку программирования C++</p>
    </footer>

    <script src="js/navigation.js"></script>
    <script src="js/gamification.js"></script>
    <script>
        // Per-achievement gradient palettes
        const ACH_GRADS = {
            first_code:   'linear-gradient(135deg,#f97316,#fbbf24)',
            first_quiz:   'linear-gradient(135deg,#06b6d4,#3b82f6)',
            streak3:      'linear-gradient(135deg,#ef4444,#f97316)',
            streak7:      'linear-gradient(135deg,#f97316,#eab308)',
            streak14:     'linear-gradient(135deg,#eab308,#84cc16)',
            streak30:     'linear-gradient(135deg,#a855f7,#ec4899)',
            read60:       'linear-gradient(135deg,#10b981,#06b6d4)',
            read300:      'linear-gradient(135deg,#059669,#0891b2)',
            chapter1:     'linear-gradient(135deg,#58a6ff,#a78bfa)',
            chapter2:     'linear-gradient(135deg,#f78166,#fb923c)',
            chapter3:     'linear-gradient(135deg,#7ee787,#22d3ee)',
            chapter4:     'linear-gradient(135deg,#d2a8ff,#a78bfa)',
            level5:       'linear-gradient(135deg,#fbbf24,#f59e0b)',
            level10:      'linear-gradient(135deg,#f59e0b,#ef4444)',
            code50:       'linear-gradient(135deg,#6366f1,#8b5cf6)',
            code100:      'linear-gradient(135deg,#8b5cf6,#ec4899)',
            tests10:      'linear-gradient(135deg,#14b8a6,#06b6d4)',
            tests25:      'linear-gradient(135deg,#0ea5e9,#6366f1)',
            perfect_quiz: 'linear-gradient(135deg,#f59e0b,#ef4444)',
            night_owl:    'linear-gradient(135deg,#1e1b4b,#4f46e5)',
            early_bird:   'linear-gradient(135deg,#fde68a,#f97316)',
            debugger:     'linear-gradient(135deg,#ef4444,#7c3aed)',
            explorer:     'linear-gradient(135deg,#10b981,#3b82f6)',
            comeback:     'linear-gradient(135deg,#6366f1,#ec4899)',
            legend:       'linear-gradient(135deg,#fbbf24,#f97316,#ec4899,#a855f7)',
        };

        const GROUP_LABELS = {
            activity: { icon: '🔥', label: 'Активность' },
            chapters: { icon: '📚', label: 'Главы' },
            progress: { icon: '⬆️', label: 'Прогресс' },
            code:     { icon: '💻', label: 'Код и тесты' },
            special:  { icon: '✨', label: 'Особые' },
        };

        async function renderAchievements() {
            const container = document.getElementById('ach-groups-container');
            if (!container) return;

            // Загружаем достижения с сервера
            const user = JSON.parse(localStorage.getItem('cpp_user') || 'null');
            let unlockedMap = {}; // achievementId → unlockedAt

            if (user?.isuNumber) {
                try {
                    const res = await fetch(`/api/achievements/${user.isuNumber}`);
                    if (res.ok) {
                        const data = await res.json();
                        data.forEach(a => { unlockedMap[a.achievementId] = a.unlockedAt; });
                    }
                } catch {}
            }

            const unlocked = Object.keys(unlockedMap);

            // Stats
            const total = ACHIEVEMENT_DEFS.length;
            const count = unlocked.length;
            const coinsEarned = ACHIEVEMENT_DEFS.filter(a => unlocked.includes(a.id)).reduce((s, a) => s + a.reward, 0);
            document.getElementById('ach-unlocked-count').textContent = count;
            document.getElementById('ach-total-count').textContent = total;
            document.getElementById('ach-coins-earned').textContent = coinsEarned;
            document.getElementById('ach-pct').textContent = Math.round(count / total * 100) + '%';

            // Group by group key
            const groups = {};
            ACHIEVEMENT_DEFS.forEach(a => {
                const g = a.group || 'special';
                if (!groups[g]) groups[g] = [];
                groups[g].push(a);
            });

            container.innerHTML = '';
            for (const [groupKey, defs] of Object.entries(groups)) {
                const meta = GROUP_LABELS[groupKey] || { icon: '🏅', label: groupKey };
                const section = document.createElement('section');
                section.className = 'ach-group';
                section.innerHTML = `<div class="ach-group-title">${meta.icon} ${meta.label}</div>
                    <div class="ach-hex-grid" id="ach-grid-${groupKey}"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('.ach-hex-grid');
                defs.forEach(def => {
                    const isUnlocked = def.id in unlockedMap;
                    const grad = ACH_GRADS[def.id] || 'linear-gradient(135deg,#5b4fcf,#3b82f6)';
                    let dateStr = '';
                    if (isUnlocked && unlockedMap[def.id]) {
                        const d = new Date(unlockedMap[def.id]);
                        dateStr = `<div class="ach-hex-card-date">${d.toLocaleDateString('ru-RU')}</div>`;
                    }

                    const card = document.createElement('div');
                    card.className = 'ach-hex-card' + (isUnlocked ? '' : ' locked');
                    card.style.setProperty('--ach-grad', grad);
                    card.innerHTML = `
                        <div class="ach-hex">
                            <div class="ach-hex-ring"></div>
                            <div class="ach-hex-bg"></div>
                            <img class="ach-hex-img" src="${def.img}" alt="${def.name}" loading="lazy">
                        </div>
                        <div class="ach-hex-card-name">${def.name}</div>
                        <div class="ach-hex-card-desc">${def.desc}</div>
                        ${isUnlocked
                            ? `<div class="ach-hex-card-reward">+${def.reward} 🪙</div>${dateStr}`
                            : `<div class="ach-hex-progress"><div class="ach-hex-progress-fill" style="width:0%"></div></div>`
                        }`;
                    grid.appendChild(card);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', renderAchievements);
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
