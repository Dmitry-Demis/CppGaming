<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Achievement Icons as SVG symbols -->
  
  <!-- First Program -->
  <symbol id="achievement-first-program" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#63b3ff" opacity="0.2"/>
    <path d="M32 8 L40 20 L54 22 L43 33 L46 47 L32 40 L18 47 L21 33 L10 22 L24 20 Z" fill="#63b3ff"/>
    <text x="32" y="38" text-anchor="middle" font-size="20" fill="#fff">🎯</text>
  </symbol>
  
  <!-- Integer Master -->
  <symbol id="achievement-integer-master" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#a78bfa" opacity="0.2"/>
    <rect x="16" y="16" width="32" height="32" rx="4" fill="#a78bfa"/>
    <text x="32" y="38" text-anchor="middle" font-size="20" fill="#fff">🔢</text>
  </symbol>
  
  <!-- Float Expert -->
  <symbol id="achievement-float-expert" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#22d3ee" opacity="0.2"/>
    <path d="M32 10 L50 32 L32 54 L14 32 Z" fill="#22d3ee"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" fill="#fff">📊</text>
  </symbol>
  
  <!-- Char Wizard -->
  <symbol id="achievement-char-wizard" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#34d399" opacity="0.2"/>
    <polygon points="32,8 40,24 56,24 44,36 48,52 32,42 16,52 20,36 8,24 24,24" fill="#34d399"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" fill="#fff">📝</text>
  </symbol>
  
  <!-- Bool Logic -->
  <symbol id="achievement-bool-logic" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#fbbf24" opacity="0.2"/>
    <circle cx="32" cy="32" r="20" fill="#fbbf24"/>
    <text x="32" y="38" text-anchor="middle" font-size="20" fill="#fff">💡</text>
  </symbol>
  
  <!-- Limits Explorer -->
  <symbol id="achievement-limits-explorer" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#fb923c" opacity="0.2"/>
    <path d="M32 12 L44 24 L52 32 L44 40 L32 52 L20 40 L12 32 L20 24 Z" fill="#fb923c"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" fill="#fff">🔍</text>
  </symbol>
  
  <!-- Type Guru -->
  <symbol id="achievement-type-guru" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#8b5cf6" opacity="0.2"/>
    <path d="M32 8 L42 18 L54 18 L54 30 L44 40 L44 52 L32 52 L20 52 L20 40 L10 30 L10 18 L22 18 Z" fill="#8b5cf6"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" fill="#fff">🧙</text>
  </symbol>
  
  <!-- Quiz Master -->
  <symbol id="achievement-quiz-master" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#f87171" opacity="0.2"/>
    <rect x="18" y="14" width="28" height="36" rx="2" fill="#f87171"/>
    <rect x="22" y="20" width="20" height="3" rx="1" fill="#fff"/>
    <rect x="22" y="28" width="20" height="3" rx="1" fill="#fff"/>
    <rect x="22" y="36" width="20" height="3" rx="1" fill="#fff"/>
    <text x="32" y="50" text-anchor="middle" font-size="16" fill="#fff">🎓</text>
  </symbol>
  
  <!-- Code Runner -->
  <symbol id="achievement-code-runner" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#10b981" opacity="0.2"/>
    <polygon points="20,16 20,48 48,32" fill="#10b981"/>
    <text x="38" y="38" text-anchor="middle" font-size="16" fill="#fff">⚡</text>
  </symbol>
  
  <!-- Perfectionist -->
  <symbol id="achievement-perfectionist" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#fbbf24" opacity="0.2"/>
    <path d="M32 8 L36 24 L52 24 L40 34 L44 50 L32 40 L20 50 L24 34 L12 24 L28 24 Z" fill="#fbbf24"/>
    <circle cx="32" cy="32" r="8" fill="#fff"/>
    <text x="32" y="36" text-anchor="middle" font-size="14" fill="#fbbf24">⭐</text>
  </symbol>
</svg>
