<!-- Результаты (Quiz inline) -->
<template id="tpl-quiz-results">
  <div class="quiz-results">
    <div class="results-emoji"></div>
    <h2 class="results-title">Результаты теста</h2>
    <div class="results-circle">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border-primary)" stroke-width="8"/>
        <circle class="results-arc" cx="50" cy="50" r="42" fill="none"
                stroke-width="8" stroke-linecap="round"
                transform="rotate(-90 50 50)"/>
      </svg>
      <div class="results-pct"></div>
    </div>
    <p class="results-msg"></p>
    <div class="results-stats">
      <div class="rstat"><div class="rstat-v js-score"></div><div class="rstat-l">Очков</div></div>
      <div class="rstat"><div class="rstat-v js-correct"></div><div class="rstat-l">Правильных</div></div>
      <div class="rstat"><div class="rstat-v js-total"></div><div class="rstat-l">Вопросов</div></div>
    </div>
    <div class="results-achievement" hidden>🏆 Достижение разблокировано!</div>
    <div class="results-rewards" hidden></div>
    <div class="results-actions">
      <button class="btn btn--primary js-retry">Пройти снова</button>
      <button class="btn btn--secondary js-to-top">К началу страницы</button>
    </div>
  </div>
</template>
