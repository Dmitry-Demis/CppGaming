<!-- Matching — карточки перетаскиваются в слоты -->

<!-- Пул карточек (правая колонка) -->
<template id="tpl-matching-pool">
  <div class="quiz-matching-cards js-matching-pool"></div>
</template>

<!-- Одна карточка -->
<template id="tpl-matching-card">
  <div class="quiz-matching-card" draggable="true">
    <span class="quiz-matching-drag-handle">⠿</span>
    <span class="js-card-text"></span>
  </div>
</template>

<!-- Обёртка слотов -->
<template id="tpl-matching-slots">
  <div class="quiz-matching-slots js-matching-slots"></div>
</template>

<!-- Одна строка: левый элемент + слот -->
<template id="tpl-matching-row">
  <div class="quiz-matching-row">
    <div class="quiz-matching-label">
      <span class="quiz-answer-letter js-row-letter"></span>
      <span class="js-row-left"></span>
    </div>
    <div class="quiz-matching-slot js-slot">
      <span class="quiz-matching-slot-hint">Перетащите сюда</span>
    </div>
  </div>
</template>

<!-- Подсказка правильного ответа (показывается при ошибке) -->
<template id="tpl-matching-hint">
  <span class="quiz-matching-answer-hint js-hint-text"></span>
</template>
