<!-- Matching — карточки перетаскиваются в слоты -->

<template id="tpl-matching-pool">
  <div class="quiz-matching-cards js-matching-pool" id="{{poolId}}"></div>
</template>

<template id="tpl-matching-card">
  <div class="quiz-matching-card" draggable="true" data-value="{{value}}">
    <span class="quiz-matching-drag-handle">⠿</span>
    <span>{{text}}</span>
  </div>
</template>

<template id="tpl-matching-slots">
  <div class="quiz-matching-slots js-matching-slots"></div>
</template>

<template id="tpl-matching-row">
  <div class="quiz-matching-row">
    <div class="quiz-matching-label">
      <span class="quiz-answer-letter">{{letter}}</span>
      <span>{{left}}</span>
    </div>
    <div class="quiz-matching-slot" data-slot="{{slot}}" data-expected="{{expected}}" id="{{slotId}}">
      <span class="quiz-matching-slot-hint">Перетащите сюда</span>
    </div>
  </div>
</template>

<template id="tpl-matching-hint">
  <span class="quiz-matching-answer-hint">{{expected}}</span>
</template>
