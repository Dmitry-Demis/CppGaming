<!DOCTYPE html>
<html lang="ru">
    <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("cpp_theme")||"dark")</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Курс C++</title>
    <script src="js/auth-guard.js"></script>
    <link rel="stylesheet" href="css/variables.css?v=3">
    <link rel="stylesheet" href="components/theme/css/theme-picker.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="components/gamification/css/gamification.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        /* ── Page ── */
        .profile-page {
            max-width: 900px;
            margin: 0 auto;
            padding: calc(var(--header-height) + var(--space-3)) var(--space-5) var(--space-16);
        }
        .profile-topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: var(--space-8);
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-tertiary); text-decoration: none; font-size: 0.875rem;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text-primary); text-decoration: none; }
        .logout-btn {
            background: none; border: 1px solid var(--border-primary);
            color: var(--text-tertiary); padding: 0.4rem 1rem;
            border-radius: 8px; cursor: pointer; font-size: 0.875rem; transition: all .2s;
        }
        .logout-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

        /* ── Glass card mixin ── */
        .glass {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border-secondary);
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }

        /* ── Hero card ── */
        .hero-card {
            position: relative; overflow: hidden;
            padding: var(--space-8);
            margin-bottom: var(--space-5);
        }
        .hero-card::before {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            background: var(--body-grad);
        }
        .hero-top {
            position: relative;
            display: flex; align-items: flex-start; gap: var(--space-5); flex-wrap: wrap;
        }
        .hero-avatar {
            width: 88px; height: 88px; border-radius: 50%; flex-shrink: 0;
            background: var(--grad-main);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.4rem;
            box-shadow: 0 0 0 3px var(--border-accent), var(--shadow-glow-purple);
        }
        .hero-meta { flex: 1; min-width: 180px; }
        .hero-name { font-size: 1.7rem; font-weight: 800; color: #fff; line-height: 1.15; }
        .hero-sub  { color: var(--text-tertiary); font-size: 0.82rem; margin-top: 4px; }
        .hero-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600;
        }
        .badge-level  { background: rgba(167,139,250,.15); color: #a78bfa; border: 1px solid rgba(167,139,250,.3); }
        .badge-streak { background: rgba(126,184,247,.1);  color: #7eb8f7; border: 1px solid rgba(126,184,247,.25); }
        .badge-record { background: rgba(253,230,138,.08); color: #fde68a; border: 1px solid rgba(253,230,138,.18); }

        .hero-pts-block {
            text-align: right; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
        }
        .hero-pts-val { font-size: 2.2rem; font-weight: 900; color: #fde68a; line-height: 1; }
        .hero-pts-lbl { font-size: 0.72rem; color: var(--text-tertiary); }

        /* XP bar */
        .hero-xp-wrap { position: relative; margin-top: var(--space-5); }
        .hero-xp-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 6px; }
        .hero-xp-track { height: 8px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
        .hero-xp-fill  { height: 100%; background: var(--grad-main); border-radius: 99px; width: 0; transition: width .8s ease; }

        /* ── Stats grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        .stat-card {
            padding: var(--space-4) var(--space-3);
            text-align: center;
            opacity: 0;
            transition: border-color .2s, transform .2s, box-shadow .2s;
            cursor: default;
        }
        .stat-card:hover {
            border-color: var(--border-accent);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow-purple);
        }
        .stat-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .stat-val  { font-size: 1.4rem; font-weight: 800; color: #fff; line-height: 1; }
        .stat-lbl  { font-size: 0.68rem; color: var(--text-tertiary); margin-top: 4px; letter-spacing: .02em; }

        /* ── Section heading ── */
        .sec-heading {
            font-size: 0.72rem; font-weight: 700; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: .1em;
            margin-bottom: var(--space-4);
            display: flex; align-items: center; gap: 10px;
        }
        .sec-heading::after { content: ''; flex: 1; height: 1px; background: var(--border-primary); }

        /* ── Chapter blocks ── */
        .chapters-list { display: flex; flex-direction: column; gap: var(--space-4); }
        .chapter-block { overflow: hidden; opacity: 0; transition: border-color .2s, box-shadow .2s; }
        .chapter-block:hover { border-color: var(--border-accent); box-shadow: 0 4px 20px rgba(91,79,207,.12); }

        .chapter-header {
            display: flex; align-items: center; gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
        }
        .chapter-icon {
            width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
            background: var(--grad-subtle, rgba(124,92,191,.15));
            border: 1px solid rgba(167,139,250,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .chapter-info { flex: 1; min-width: 0; }
        .chapter-name { font-weight: 700; color: var(--text-primary); font-size: 0.95rem; }
        .chapter-meta { color: var(--text-tertiary); font-size: 0.78rem; margin-top: 2px; }

        /* Chapter progress bar */
        .chapter-progress-wrap { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
        .chapter-progress-track {
            flex: 1; height: 4px;
            background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden;
        }
        .chapter-progress-fill { height: 100%; background: var(--grad-main); border-radius: 99px; transition: width .6s ease; }
        .chapter-progress-pct { font-size: 0.68rem; color: var(--text-tertiary); white-space: nowrap; }

        .chapter-pts { font-size: 1rem; font-weight: 800; color: #fde68a; white-space: nowrap; flex-shrink: 0; }
        .chapter-pts.zero { color: var(--text-tertiary); font-weight: 400; font-size: 0.85rem; }

        /* ── Tests section ── */
        .tests-wrap {
            border-top: 1px solid var(--border-primary);
            padding: var(--space-3) var(--space-5) var(--space-4);
            display: flex; flex-direction: column; gap: var(--space-1);
        }
        .para-label {
            font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .08em; color: var(--text-tertiary);
            padding: var(--space-2) 0 var(--space-1);
        }
        .test-row {
            display: flex; align-items: center; gap: var(--space-3);
            border-radius: 10px; padding: 0.5rem 0.75rem;
            text-decoration: none; color: inherit;
            transition: background .15s, transform .12s;
            cursor: default;
            background: rgba(255,255,255,.03);
        }
        a.test-row { cursor: pointer; }
        a.test-row:hover {
            background: rgba(167,139,250,.08);
            transform: translateX(4px);
            text-decoration: none;
        }
        .test-row.not-started { opacity: 0.4; }

        .test-dot {
            width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700;
        }
        .test-dot.pass { background: rgba(110,231,183,.15); color: #6ee7b7; }
        .test-dot.fail { background: rgba(248,113,113,.12); color: #f87171; }
        .test-dot.none { background: rgba(255,255,255,.05); color: var(--text-tertiary); font-size: 0.9rem; }

        .test-info { flex: 1; min-width: 0; }
        .test-title { font-size: 0.85rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .test-id    { font-size: 0.67rem; color: var(--text-tertiary); font-family: monospace; margin-top: 1px; }

        .test-meta  { font-size: 0.68rem; color: var(--text-tertiary); white-space: nowrap; }
        .test-score {
            font-size: 0.8rem; font-weight: 700;
            padding: 2px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
        }
        .test-score.pass { background: rgba(110,231,183,.12); color: #6ee7b7; }
        .test-score.fail { background: rgba(251,191,36,.1);   color: #fbbf24; }

        /* ── Empty / loading ── */
        .empty-state { text-align: center; padding: var(--space-16); color: var(--text-tertiary); }
        .empty-icon  { font-size: 3rem; margin-bottom: var(--space-3); }

        /* ── Dashboard cards ── */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: var(--space-4);
        }
        .dash-card {
            border-radius: 18px; overflow: hidden; opacity: 0;
            transition: border-color .2s, box-shadow .2s, transform .2s;
        }
        .dash-card:hover {
            border-color: var(--border-accent);
            box-shadow: 0 8px 32px rgba(91,79,207,.18);
            transform: translateY(-2px);
        }
        .dash-card-head {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 18px 12px;
        }
        .dash-card-icon {
            width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
            background: rgba(124,92,191,.18); border: 1px solid rgba(167,139,250,.2);
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .dash-card-title { font-weight: 700; font-size: .9rem; color: var(--text-primary); }
        .dash-card-sub   { font-size: .72rem; color: var(--text-tertiary); margin-top: 2px; }
        .dash-card-body  { padding: 0 18px 16px; display: flex; flex-direction: column; gap: 10px; }

        /* reading time big display */
        .dash-read-time {
            display: flex; align-items: baseline; gap: 6px;
            padding: 10px 14px; border-radius: 12px;
            background: rgba(126,184,247,.07); border: 1px solid rgba(126,184,247,.12);
        }
        .dash-read-val { font-size: 1.6rem; font-weight: 800; color: #7eb8f7; line-height: 1; }
        .dash-read-unit { font-size: .75rem; color: var(--text-tertiary); }
        .dash-read-sessions { font-size: .72rem; color: var(--text-tertiary); margin-left: auto; }

        /* stat row */
        .dash-stat-row {
            display: flex; align-items: center; justify-content: space-between;
            font-size: .8rem; color: var(--text-secondary);
        }
        .dash-stat-row span:last-child { font-weight: 700; color: var(--text-primary); }

        /* test list */
        .dash-test-list { display: flex; flex-direction: column; gap: 6px; }
        .dash-test-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 8px;
            background: rgba(255,255,255,.03);
            font-size: .78rem;
        }
        .dash-test-dot {
            width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: .65rem; font-weight: 700;
        }
        .dash-test-dot.pass { background: rgba(110,231,183,.15); color: #6ee7b7; }
        .dash-test-dot.fail { background: rgba(248,113,113,.12); color: #f87171; }
        .dash-test-dot.none { background: rgba(255,255,255,.05); color: var(--text-tertiary); }
        .dash-test-name { flex: 1; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dash-test-score {
            font-weight: 700; font-size: .75rem; padding: 2px 7px; border-radius: 5px; white-space: nowrap;
        }
        .dash-test-score.pass { background: rgba(110,231,183,.12); color: #6ee7b7; }
        .dash-test-score.fail { background: rgba(251,191,36,.1); color: #fbbf24; }
        .dash-test-score.none { color: var(--text-tertiary); }

        /* not started overlay */
        .dash-not-started {
            text-align: center; padding: 14px 0;
            font-size: .8rem; color: var(--text-tertiary);
        }
        .dash-not-started span { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* chapter progress bar inside card */
        .dash-progress-wrap { display: flex; align-items: center; gap: 8px; }
        .dash-progress-track {
            flex: 1; height: 5px; background: rgba(255,255,255,.07);
            border-radius: 99px; overflow: hidden;
        }
        .dash-progress-fill { height: 100%; background: var(--grad-main); border-radius: 99px; transition: width .6s ease; }
        .dash-progress-pct { font-size: .68rem; color: var(--text-tertiary); white-space: nowrap; min-width: 28px; text-align: right; }

        /* ── Course tabs ── */
        .course-tabs {
            display: flex; gap: 4px; margin-bottom: var(--space-5);
            background: var(--bg-tertiary); border-radius: 14px; padding: 4px;
            border: 1px solid var(--border-primary);
        }
        .course-tab {
            flex: 1; padding: 9px 16px; border-radius: 10px; border: none;
            background: none; color: var(--text-tertiary); font-size: .85rem; font-weight: 600;
            cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .course-tab.active {
            background: var(--accent-indigo-dim);
            border: 1px solid var(--accent-indigo);
            color: var(--text-primary); box-shadow: var(--shadow-glow-blue);
        }
        .course-tab:not(.active):hover { background: var(--bg-card-hover); color: var(--text-secondary); }
        .course-section { display: none; margin-bottom: var(--space-8); }
        .course-section.active { display: block; }

        /* ── Chapter accordion ── */
        .chapter-tile {
            border-radius: 16px; overflow: hidden; margin-bottom: var(--space-3);
            transition: border-color .25s, box-shadow .25s;
        }
        .chapter-tile:hover { border-color: var(--border-accent); box-shadow: 0 4px 24px rgba(91,79,207,.14); }
        .chapter-tile-head {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
            background: var(--bg-tertiary); cursor: pointer; user-select: none;
        }
        .chapter-tile-icon {
            width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
            background: rgba(124,92,191,.18); border: 1px solid rgba(167,139,250,.2);
            display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
        }
        .chapter-tile-info { flex: 1; min-width: 0; }
        .chapter-tile-name { font-weight: 700; font-size: .92rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chapter-tile-sub  { font-size: .68rem; color: var(--text-tertiary); margin-top: 2px; }
        .chapter-tile-arrow { color: var(--text-tertiary); font-size: .7rem; transition: transform .25s; flex-shrink: 0; }
        .chapter-tile-head:not(.open) .chapter-tile-arrow { transform: rotate(-90deg); }

        /* Chapter summary badges */
        .ch-badges { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
        .ch-badge { display: flex; flex-direction: column; align-items: center; padding: 4px 10px; border-radius: 10px; min-width: 52px; }
        .ch-badge.time  { background: rgba(126,184,247,.1);  border: 1px solid rgba(126,184,247,.2); }
        .ch-badge.tests { background: rgba(110,231,183,.1);  border: 1px solid rgba(110,231,183,.2); }
        .ch-badge.reads { background: rgba(251,191,36,.08);  border: 1px solid rgba(251,191,36,.18); }
        .ch-badge .cb-val { font-size: .8rem; font-weight: 800; line-height: 1.1; }
        .ch-badge.time  .cb-val { color: #7eb8f7; }
        .ch-badge.tests .cb-val { color: #6ee7b7; }
        .ch-badge.reads .cb-val { color: #fbbf24; }
        .ch-badge .cb-lbl { font-size: .58rem; color: var(--text-tertiary); margin-top: 1px; }

        .chapter-body { display: none; flex-direction: column; }
        .chapter-body.open { display: flex; }

        /* ══ THEORY DASHBOARD ══ */
        .theory-dash { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 0; }

        /* Jug SVG in chapter header */
        .ch-jug { flex-shrink: 0; }

        /* Para table */
        .para-table { width: 100%; border-collapse: collapse; }
        .para-table-head-row {
            display: grid;
            grid-template-columns: 26px 1fr 52px 90px 80px 96px 58px;
            gap: 6px; padding: 7px 14px 6px;
            font-size: .6rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: .07em;
            border-bottom: 1px solid var(--border-primary);
            margin-bottom: 2px;
        }
        .para-table-head-row > div:not(:nth-child(2)) { text-align: center; }

        /* Para row — now a grid div, not an <a> */
        .para-row-grid {
            display: grid;
            grid-template-columns: 26px 1fr 52px 90px 80px 96px 58px;
            gap: 6px; align-items: start;
            padding: 9px 14px;
            border-radius: 10px;
            transition: background .15s;
            margin-bottom: 2px;
        }
        .para-row-grid:hover { background: rgba(167,139,250,.07); }
        .para-row-grid.unread { opacity: .65; }
        .pr-name-link {
            font-weight: 600; font-size: .85rem; color: var(--text-primary);
            text-decoration: none; display: block;
        }
        .pr-name-link:hover { color: #a78bfa; text-decoration: none; }

        /* Para tests toggle */
        .para-row-wrap { margin-bottom: 2px; }
        .para-tests-toggle {
            display: inline-flex; align-items: center; gap: 5px;
            margin-top: 3px; cursor: pointer;
            font-size: .68rem; color: var(--text-tertiary);
            transition: color .15s;
        }
        .para-tests-toggle:hover { color: #a78bfa; }
        .ptt-label { }
        .ptt-arrow { font-size: .55rem; transition: transform .2s; }
        /* Detail panel is OUTSIDE the grid row — spans full width */
        .para-tests-detail {
            margin: 0 0 4px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--border-primary);
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        /* Star */
        .pr-star { font-size: 1rem; text-align: center; line-height: 1; transition: transform .2s; }
        .para-row:hover .pr-star { transform: scale(1.25); }

        .pr-name { font-weight: 600; font-size: .85rem; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pr-name-sub { font-size: .65rem; color: var(--text-tertiary); margin-top: 1px; }

        .pr-cell { text-align: center; font-size: .78rem; color: var(--text-secondary); }
        .pr-cell strong { font-weight: 700; color: var(--text-primary); }

        /* Review badge — pulses when due */
        .review-badge {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: .68rem; font-weight: 700; padding: 3px 8px; border-radius: 7px; white-space: nowrap;
            text-decoration: none; cursor: pointer;
        }
        .review-badge:hover { opacity: .8; text-decoration: none; }
        .review-badge.overdue { background: rgba(248,113,113,.18); color: #f87171;
            animation: pulse-red 1.4s ease-in-out infinite; }
        .review-badge.today   { background: rgba(251,191,36,.15);  color: #fbbf24;
            animation: pulse-yellow 1.4s ease-in-out infinite; }
        .review-badge.soon    { background: rgba(126,184,247,.12); color: #7eb8f7; }
        .review-badge.ok      { background: rgba(110,231,183,.1);  color: #6ee7b7; }
        .review-badge.unread  { background: rgba(255,255,255,.05); color: var(--text-tertiary); cursor: default; }
        @keyframes pulse-red    { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 4px rgba(248,113,113,0)} }
        @keyframes pulse-yellow { 0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.4)}  50%{box-shadow:0 0 0 4px rgba(251,191,36,0)} }

        /* Mastery bar */
        .mastery-wrap { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .mastery-track { width: 34px; height: 4px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
        .mastery-fill  { height: 100%; border-radius: 99px; transition: width .8s ease; min-width: 2px; }
        .mastery-fill.high { background: linear-gradient(90deg,#6ee7b7,#3b82f6); }
        .mastery-fill.mid  { background: linear-gradient(90deg,#fbbf24,#f97316); }
        .mastery-fill.low  { background: linear-gradient(90deg,#f87171,#ec4899); }
        .mastery-val { font-size: .7rem; font-weight: 700; white-space: nowrap; }
        .mastery-val.high { color: #6ee7b7; }
        .mastery-val.mid  { color: #fbbf24; }
        .mastery-val.low  { color: #f87171; }
        .mastery-val.none { color: var(--text-tertiary); }

        /* Rating badge */
        .ph-rating-val {
            display: inline-flex; align-items: center; justify-content: center;
            font-size: .78rem; font-weight: 800; padding: 2px 8px; border-radius: 8px; min-width: 40px;
        }
        .ph-rating-val.high { background: rgba(110,231,183,.12); color: #6ee7b7; }

        .p-chip.failed { background: rgba(248,113,113,.06); border: 1px solid rgba(248,113,113,.12); }
        .p-chip.total  { background: rgba(167,139,250,.07); border: 1px solid rgba(167,139,250,.15); }

        @media(max-width:640px){ .score-bar-row { grid-template-columns: 80px 1fr 42px; } }
        .score-bar-label { font-size: .72rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
        .score-bar-track { height: 8px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; position: relative; }
        .score-bar-fill  { height: 100%; border-radius: 99px; width: 0; transition: width 1s cubic-bezier(.4,0,.2,1); }
        .score-bar-fill.pass { background: linear-gradient(90deg,#6ee7b7,#3b82f6); }
        .score-bar-fill.fail { background: linear-gradient(90deg,#fbbf24,#f87171); }
        .score-bar-fill.none { background: rgba(255,255,255,.08); }
        .score-bar-val { font-size: .72rem; font-weight: 700; white-space: nowrap; }
        .score-bar-val.pass { color: #6ee7b7; }
        .score-bar-val.fail { color: #fbbf24; }
        .score-bar-val.none { color: var(--text-tertiary); }

        /* Attempt heatmap */
        .attempts-label { font-size: .63rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
        .attempts-grid { display: flex; flex-wrap: wrap; gap: 5px; }
        .attempt-dot {
            width: 11px; height: 11px; border-radius: 3px;

        }
        .attempt-dot:hover { transform: scale(1.5); }
        .attempt-dot.pass { background: #6ee7b7; box-shadow: 0 0 5px rgba(110,231,183,.5); }
        .attempt-dot.fail { background: #f87171; box-shadow: 0 0 5px rgba(248,113,113,.4); }

        /* ══ PRACTICE TABLE ══ */
        .pt-wrap { padding: 0 14px 14px; }

            display: grid;

        .tab-panel-inner {

        /* ── Dashboard shared ── */
        .dash-card-wrap {
            background: var(--bg-card); border: 1px solid var(--border-primary);
            border-radius: 16px; padding: var(--space-5); margin-bottom: var(--space-4);

            font-size: .82rem; font-weight: 700; color: var(--text-secondary);

        }
        .analytics-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: var(--space-4); }
        .a-chip { display: flex; flex-direction: column; align-items: center; padding: 10px 16px; border-radius: 12px; min-width: 80px; text-align: center; }
        .a-chip.green  { background: rgba(110,231,183,.07); border: 1px solid rgba(110,231,183,.2); }

        .a-chip .ac-lbl { font-size: .62rem; color: var(--text-tertiary); margin-top: 3px; }

        /* ── Heatmap ── */
        .heatmap-grid { display: flex; flex-wrap: wrap; gap: 3px; }
        .heatmap-cell { width: 13px; height: 13px; border-radius: 3px; cursor: default; transition: transform .1s; }
        .heatmap-cell:hover { transform: scale(1.5); }
        .heatmap-cell.l0 { background: rgba(255,255,255,.06); }
        .heatmap-cell.l1 { background: rgba(110,231,183,.3); }
        .heatmap-cell.l2 { background: rgba(110,231,183,.55); }
        .heatmap-cell.l3 { background: rgba(110,231,183,.8); }

        .bar-row { display: grid; grid-template-columns: 130px 1fr 52px; gap: 8px; align-items: center; }
        @media(max-width:600px){ .bar-row { grid-template-columns: 80px 1fr 42px; } }
        .bar-label { font-size: .72rem; color: var(--text-secondary); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-track { height: 10px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }
        .bar-fill.green  { background: linear-gradient(90deg,#6ee7b7,#3b82f6); }

        /* ── Score timeline ── */
        .score-timeline { display: flex; align-items: flex-end; gap: 3px; height: 80px; padding: 4px 0; overflow-x: auto; }
        .score-bar-t { flex-shrink: 0; width: 10px; border-radius: 3px 3px 0 0; position: relative; cursor: default; }
        .score-bar-t:hover::after {
            content: attr(data-tip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);

        /* ── Weekly bars ── */
        .weekly-chart { display: flex; align-items: flex-end; gap: 8px; height: 100px; overflow-x: auto; padding-bottom: 4px; }
        .weekly-group { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
        .weekly-bars  { display: flex; align-items: flex-end; gap: 2px; }
        .weekly-bar   { width: 8px; border-radius: 2px 2px 0 0; }
        .weekly-lbl   { font-size: .55rem; color: var(--text-tertiary); white-space: nowrap; }

        /* ── Improvement ── */
        .improve-row { display: grid; grid-template-columns: 120px 44px 1fr 44px; gap: 8px; align-items: center; margin-bottom: 7px; }
        @media(max-width:600px){ .improve-row { grid-template-columns: 70px 36px 1fr 36px; } }
        .improve-label { font-size: .7rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
        .improve-score { font-size: .7rem; font-weight: 700; text-align: center; }
        .improve-track { height: 8px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; position: relative; }
        .improve-first { height: 100%; border-radius: 99px; background: rgba(248,113,113,.5); position: absolute; top:0; left:0; }
        .improve-best  { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#6ee7b7,#3b82f6); position: absolute; top:0; left:0; }

        /* ── Pie chart ── */
        .pie-wrap { display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap; }
        .pie-legend { display: flex; flex-direction: column; gap: 7px; }
        .pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: .78rem; color: var(--text-secondary); }
        .pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>

<script>
const GS = { get: (k,d) => { try { const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); } catch{return d;} } };

const LEVEL_DATA = [
    { level:1,  min:0,     title:'Новичок',     icon:'🌱' },
    { level:2,  min:100,   title:'Ученик',      icon:'📘' },
    { level:3,  min:250,   title:'Практикант',  icon:'⚙️' },
    { level:4,  min:500,   title:'Программист', icon:'💻' },
    { level:5,  min:1000,  title:'Эксперт',     icon:'🔬' },
    { level:6,  min:2000,  title:'Мастер C++',  icon:'👑' },
    { level:7,  min:3500,  title:'Архитектор',  icon:'🧠' },
    { level:8,  min:5500,  title:'Хакер',       icon:'🚀' },
    { level:9,  min:8000,  title:'Ниндзя кода', icon:'⚡' },
    { level:10, min:11000, title:'Снайпер',     icon:'🎯' },
    { level:11, min:15000, title:'Чемпион',     icon:'🏆' },
    { level:12, min:20000, title:'Алмазный',    icon:'💎' },
    { level:13, min:26000, title:'Оракул',      icon:'🔮' },
    { level:14, min:33000, title:'Звезда',      icon:'🌟' },
    { level:15, min:41000, title:'Киборг',      icon:'🦾' },
    { level:16, min:50000, title:'Генетик',     icon:'🧬' },
    { level:17, min:60000, title:'Пирокод',     icon:'🔥' },
    { level:18, min:71000, title:'Гений',       icon:'💡' },
    { level:19, min:83000, title:'Ветеран',     icon:'🎖️' },
    { level:20, min:96000, title:'Космонавт',   icon:'🛸' },
    { level:21, min:110000,title:'Галактик',    icon:'🌌' },
    { level:22, min:125000,title:'Рыцарь',      icon:'⚔️' },
    { level:23, min:141000,title:'Провидец',    icon:'🧿' },
    { level:24, min:158000,title:'Легенда',     icon:'🏅' },
    { level:25, min:176000,title:'Профессор',   icon:'🎓' },
    { level:26, min:195000,title:'Орёл',        icon:'🦅' },
    { level:27, min:215000,title:'Призрак',     icon:'👾' },
    { level:28, min:236000,title:'Терминатор',  icon:'🤖' },
];
function getLevel(pts) { return [...LEVEL_DATA].reverse().find(l => pts >= l.min) || LEVEL_DATA[0]; }
function logout() { localStorage.removeItem('cpp_user'); window.location.href = 'login.html'; }

function _fmtReadLabel(totalReadSecs) {
    const h = Math.floor(totalReadSecs / 3600);
    const m = Math.floor((totalReadSecs % 3600) / 60);
    const s = totalReadSecs % 60;
    return h > 0 ? `${h}ч ${m}м` : m > 0 ? `${m}м ${s}с` : totalReadSecs > 0 ? `${s}с` : '0м';
}

function updateStatsFromProgress(progressMap) {
    let totalReadSecs = 0, totalSessions = 0, totalCodeRuns = 0, totalTestsDone = 0;
    Object.values(progressMap).forEach(p => {
        totalReadSecs  += p.totalReadingSeconds  || 0;
        totalSessions  += p.readingSessionsCount || 0;
        totalCodeRuns  += p.codeRunsCount        || 0;
        Object.values(p.tests || {}).forEach(t => {
            if ((t.attemptsCount || 0) > 0) totalTestsDone++;
        });
    });
    const el = id => document.getElementById(id);
    if (el('stat-read-time'))   el('stat-read-time').textContent   = _fmtReadLabel(totalReadSecs);
    if (el('stat-sessions'))    el('stat-sessions').textContent    = totalSessions;
    if (el('stat-code-runs'))   el('stat-code-runs').textContent   = totalCodeRuns;
    if (el('stat-tests-done'))  el('stat-tests-done').textContent  = totalTestsDone;
}

async function loadProfile() {
    const user = JSON.parse(localStorage.getItem('cpp_user') || 'null');
    if (!user) { window.location.href = 'login.html'; return; }

    // Helper: fetch with timeout
    async function fetchWithTimeout(url, opts = {}, ms = 8000) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), ms);
        try {
            const r = await fetch(url, { ...opts, signal: ctrl.signal });
            clearTimeout(tid);
            return r;
        } catch(e) {
            clearTimeout(tid);
            throw e;
        }
    }

    try {
        // Load profile + course structure first (required)
        const [profileRes, courseRes] = await Promise.all([
            fetchWithTimeout(`/api/profile/${user.isuNumber}`),
            fetchWithTimeout('/api/course-structure')
        ]);

        if (!profileRes.ok) { window.location.href = 'login.html'; return; }

        const profile = await profileRes.json();
        const course  = courseRes.ok ? await courseRes.json() : { chapters: [] };
        const chapters = course.chapters || [];

        // Render hero + stats immediately with empty progress
        renderProfile(profile, chapters, {});

        // Then load progress separately and update
        try {
            const progressRes = await fetchWithTimeout(`/api/progress/${user.isuNumber}/all`, {}, 10000);
            const progressMap = progressRes.ok ? await progressRes.json() : {};
            // Update stats cards with real data
            updateStatsFromProgress(progressMap);
            // Re-render chapters progress section
            await loadChaptersProgress(user.isuNumber, chapters, progressMap);
            // Store context for lazy analytics loading on tab click
            _analyticsCtx = { isuNumber: user.isuNumber, chapters, progressMap };
        } catch(e) {
            console.warn('Progress load failed:', e);
            loadChaptersProgress(user.isuNumber, chapters, {});
        }

    } catch(e) {
        console.error('Profile load error:', e);
        document.getElementById('profileContent').innerHTML =
            '<div class="empty-state"><div class="empty-icon">❌</div><p>Ошибка загрузки профиля</p></div>';
    }
}

function renderProfile(data, chapters, progressMap) {
    const coins = data.coins ?? 0;
    const readLabel = '...';
    const user = JSON.parse(localStorage.getItem('cpp_user') || 'null');
    // isAdmin — только из ответа сервера, не из localStorage
    const isAdmin = !!data.isAdmin;

    // Guard against missing server data
    const xp      = data.xp    || 0;
    const level   = data.level || 1;
    const lvl     = getLevel(xp);
    const xpInLevel   = xp % 500;
    const xpForNext   = 500;
    const xpFillPct   = Math.min(xpInLevel / xpForNext * 100, 100);
    const xpToNext    = xpForNext - xpInLevel;
    const adminStyle  = isAdmin ? 'border-color:#fde68a;box-shadow:0 0 0 2px rgba(253,230,138,.35),0 8px 32px rgba(253,230,138,.12);' : '';
    const adminBadge  = isAdmin ? `<span class="badge" style="background:rgba(253,230,138,.15);color:#fde68a;border:1px solid rgba(253,230,138,.4)">👑 Администратор</span>` : '';

    document.getElementById('profileContent').innerHTML = `
        <div class="hero-card glass" id="hero-card" style="${adminStyle}">
            <div class="hero-top">
                <div class="hero-avatar" id="hero-avatar">${lvl.icon}</div>
                <div class="hero-meta">
                    <div class="hero-name">${data.firstName || ''} ${data.lastName || ''}</div>
                    <div class="hero-sub">ИСУ: ${data.isuNumber} · С нами с ${new Date(data.registeredAt).toLocaleDateString('ru')}</div>
                    <div class="hero-badges">
                        <span class="badge badge-level">${lvl.icon} Ур.${level} · ${lvl.title}</span>
                        <span class="badge badge-streak"><span class="fire-flicker">🔥</span> ${data.currentStreak || 0} дн.</span>
                        <span class="badge badge-record">🏆 Рекорд ${data.maxStreak || 0} дн.</span>
                        ${adminBadge}
                    </div>
                </div>
                <div class="hero-pts-block">
                    <div class="hero-pts-val" id="pts-counter">${xp}</div>
                    <div class="hero-pts-lbl">XP</div>
                    <div style="margin-top:6px;font-size:.85rem;font-weight:700;color:#fde68a"><span class="coin-spin">🪙</span> ${coins}</div>
                    <div class="hero-pts-lbl">монет</div>
                </div>
            </div>
            <div class="hero-xp-wrap">
                <div class="hero-xp-labels">
                    <span>Ур.${level} · ${xp} XP</span>

async function loadChaptersProgress(isuNumber, chapters, progressMap) {
    const wrap = document.getElementById('course-progress-wrap');
    if (!wrap) return;

    function chapterNumFromId(id) {
        const m = id.match(/^chapter-(.+)$/);
        return m ? m[1] : id;
    }

    function fmtTime(secs) {
        if (!secs) return '—';
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        const pad = n => String(n).padStart(2, '0');
        if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
        if (m > 0) return `00:${pad(m)}:${pad(s)}`;
        return `00:00:${pad(s)}`;
    }

    function fmtDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yyyy = d.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
    }

    const CHAPTER_ICONS = ['🔢','📦','➕','🔀','⚙️','🧩','🔗','📐'];

    // Повторить — кликабельная ссылка на страницу теории с якорем #tests
    function reviewBadge(srNextDue, hasTestedAtLeastOne, testHref) {
        if (!hasTestedAtLeastOne) return `<span class="review-badge unread">—</span>`;
        if (!srNextDue) return `<a class="review-badge ok" href="${testHref}">повторить</a>`;
        const diffDays = Math.round((new Date(srNextDue) - new Date()) / 86400000);
        if (diffDays < 0)   return `<a class="review-badge overdue" href="${testHref}">⚠ просрочено</a>`;
        if (diffDays === 0) return `<a class="review-badge today" href="${testHref}">📌 сегодня</a>`;
        if (diffDays === 1) return `<a class="review-badge today" href="${testHref}">📌 завтра</a>`;
        if (diffDays <= 3)  return `<a class="review-badge soon" href="${testHref}">через ${diffDays} дн.</a>`;
        return `<a class="review-badge ok" href="${testHref}">через ${diffDays} дн.</a>`;
    }

    // Медиана из данных сервера (averageScore из TestStatsDto)
    function getMedian(quizId) {
        // Используем averageScore из progressMap если доступен
        for (const prog of Object.values(progressMap)) {
            const td = (prog.tests || {})[quizId];
            if (td && td.attemptsCount > 0) return td.averageScore ?? null;
        }
        return null;
    }

    // SVG elixir flask (potion bottle shape)
    function buildJugSvg(pct) {
        const clampedPct = Math.min(Math.max(pct, 0), 1);
        const color     = clampedPct >= 0.8 ? '#6ee7b7' : clampedPct >= 0.4 ? '#7eb8f7' : '#c084fc';
        const colorDark = clampedPct >= 0.8 ? '#059669' : clampedPct >= 0.4 ? '#3b82f6' : '#9333ea';
        const glow      = clampedPct >= 0.8 ? 'rgba(110,231,183,.5)' : clampedPct >= 0.4 ? 'rgba(126,184,247,.45)' : 'rgba(192,132,252,.45)';
        const uid = 'p' + Math.random().toString(36).slice(2, 7);

        const flaskPath = `M14,2 L22,2 L22,4 Q26,6 28,10 L32,14 Q36,16 36,20 L36,36 Q36,42 30,44 L6,44 Q0,42 0,36 L0,20 Q0,16 4,14 L8,10 Q10,6 14,4 Z`;
        const neckPath  = `M14,2 L22,2 L22,4 Q26,6 28,10 L8,10 Q10,6 14,4 Z`;

        const bodyTop = 14, bodyBot = 44, bodyH = bodyBot - bodyTop;
        const fillH = Math.round(bodyH * clampedPct);
        const fillY = bodyBot - fillH;

        // Wave on top of liquid — animates vertically (bob up/down)
        const waveAmp = 1.5;
        const wavePath = fillH > 2
            ? `<rect x="0" y="${fillY + waveAmp}" width="36" height="${fillH}" fill="url(#${uid}-grad)" opacity="0.9"/>
               <path d="M0,${fillY + waveAmp} Q9,${fillY - waveAmp} 18,${fillY + waveAmp} Q27,${fillY + waveAmp * 3} 36,${fillY + waveAmp} L36,${bodyBot} L0,${bodyBot} Z"
                fill="url(#${uid}-grad)" opacity="0.92">
                 <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="2.2s" repeatCount="indefinite"/>
               </path>`
            : (fillH > 0 ? `<rect x="0" y="${fillY}" width="36" height="${fillH}" fill="url(#${uid}-grad)" opacity="0.9"/>` : '');

        // Animated bubbles rising
        const bubbleDefs = clampedPct > 0.08 ? [
            { cx: 9,  r: 2.2, dur: '2.1s', delay: '0s'   },
            { cx: 24, r: 1.5, dur: '2.8s', delay: '0.7s' },
            { cx: 16, r: 1.8, dur: '2.4s', delay: '1.3s' },
        ].map(b => {
            const startY = bodyBot - 3;
            const endY   = fillY + 3;
            if (endY >= startY) return '';
            return `<circle cx="${b.cx}" cy="${startY}" r="${b.r}" fill="rgba(255,255,255,.4)">
                <animate attributeName="cy" from="${startY}" to="${endY}"
                    dur="${b.dur}" begin="${b.delay}" repeatCount="indefinite"/>
                <animate attributeName="opacity" from="0.5" to="0"
                    dur="${b.dur}" begin="${b.delay}" repeatCount="indefinite"/>
            </circle>`;
        }).join('') : '';

        const shine = `<path d="M16,3 Q15,7 16,11" stroke="rgba(255,255,255,.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;

        return `<svg width="36" height="46" viewBox="0 0 36 46" class="ch-jug" style="filter:drop-shadow(0 0 8px ${glow})">
            <defs>
                <clipPath id="${uid}-clip"><path d="${flaskPath}"/></clipPath>
                <linearGradient id="${uid}-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="${color}" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="${colorDark}" stop-opacity="1"/>
                </linearGradient>
                <filter id="${uid}-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,.7)"/>
                </filter>
            </defs>
            <path d="${flaskPath}" fill="rgba(255,255,255,.04)" stroke="rgba(167,139,250,.4)" stroke-width="1.2"/>
            <path d="${neckPath}" fill="rgba(255,255,255,.06)"/>
            <g clip-path="url(#${uid}-clip)">
                ${wavePath}
                ${bubbleDefs}
            </g>
            ${shine}
            <rect x="13" y="0" width="10" height="3" rx="1.5" fill="rgba(167,139,250,.6)" stroke="rgba(167,139,250,.8)" stroke-width=".6"/>
            <text x="18" y="35" text-anchor="middle" font-size="9" font-weight="900" fill="rgba(255,255,255,.95)" filter="url(#${uid}-shadow)">${(clampedPct * 100).toFixed(1)}%</text>
        </svg>`;
    }

    let theoryHtml = '';

    // Fetch page ratings — single batch request instead of N individual fetches
    const allParaIds = chapters.flatMap(ch => (ch.paragraphs || []).map(p => p.id));
    let ratingMap = {};
    try {
        const r = await fetch('/api/feedback/batch?ids=' + allParaIds.join(','));
        if (r.ok) {
            const data = await r.json();
            // data is either { paragraphId: { average } } or array
            if (Array.isArray(data)) {
                data.forEach(d => { if (d?.paragraphId && d?.average) ratingMap[d.paragraphId] = d.average; });
            } else {
                Object.entries(data).forEach(([k, v]) => { if (v?.average) ratingMap[k] = v.average; });
            }
        } else {
            // Fallback: fire all in parallel but don't await — populate ratingMap async
            allParaIds.forEach(pid =>
                fetch(`/api/feedback/${pid}`).then(r => r.ok ? r.json() : null)
                    .then(d => { if (d?.average) ratingMap[pid] = d.average; }).catch(() => {})
            );
        }
    } catch {}

    function calcRating(paragraphId) {
        const avg = ratingMap[paragraphId];
        if (!avg || avg <= 0) return null;
        return avg; // already 1–10 scale
    }

    chapters.forEach((ch, idx) => {
        const paragraphs = ch.paragraphs || [];
        const icon = CHAPTER_ICONS[idx] || '📖';

        // Chapter summary
        let chCounted = 0, chPassedTests = 0, chTotalTests = 0, chTotalSecs = 0;
        let chMasterySum = 0, chMasteryCount = 0;
        paragraphs.forEach(p => {
            const prog = progressMap[p.id] || {};
            const tests = prog.tests || {};
            // Total tests from course-meta (source of truth for count)
            const metaQids = (p.tests || []).map(t => t.quizId).filter(Boolean);
            chTotalTests += metaQids.length;
            // Passed = from server progress
            const attempted = Object.values(tests).filter(t => (t?.attemptsCount || 0) > 0);
            chTotalSecs  += prog.totalReadingSeconds || 0;
            chPassedTests += metaQids.filter(qid => (tests[qid]?.bestScore || 0) >= 70).length;
            if (attempted.length > 0) {
                chCounted++;
                const seenSum  = attempted.reduce((s, t) => s + (t.seenCount || 0), 0);
                const totalSum = attempted.reduce((s, t) => s + (t.totalQuestionsInBank || 0), 0);
                if (totalSum > 0) {
                    chMasterySum += Math.min(seenSum / totalSum * 100, 100);
                    chMasteryCount++;
                }
            }
        });

        const jugPct = paragraphs.length > 0 ? (chMasterySum / paragraphs.length) / 100 : 0;
        const jugSvg = buildJugSvg(jugPct);
        const badges = [
            chTotalSecs > 0 ? `<div class="ch-badge time"><span class="cb-val">${fmtTime(chTotalSecs)}</span><span class="cb-lbl">время</span></div>` : '',
            chTotalTests > 0 ? `<div class="ch-badge tests"><span class="cb-val">${chPassedTests}/${chTotalTests}</span><span class="cb-lbl">тестов</span></div>` : '',
            chCounted > 0 ? `<div class="ch-badge reads"><span class="cb-val">${chCounted}/${paragraphs.length}</span><span class="cb-lbl">изучено</span></div>` : '',
        ].join('');

        // Para rows
        const rowsHtml = paragraphs.map(p => {
            const prog = progressMap[p.id] || {};
            const tests = prog.tests || {};
            const qids = (p.tests || []).map(t => t.quizId).filter(Boolean);
            const sessions = prog.readingSessionsCount || 0;
            const totalSecs = prog.totalReadingSeconds || 0;
            const srNextDue = prog.srNextDue || null;

            // Tested = at least one test attempted
            const testedQids = qids.filter(qid => (tests[qid]?.attemptsCount || 0) > 0);
            const hasTest = testedQids.length > 0;

            // Mastery = seenCount / totalQuestionsInBank (как в index.html)
            let mastery = null;
            {
                const attempted = Object.values(tests).filter(t => (t?.attemptsCount || 0) > 0);
                if (attempted.length > 0) {
                    const seenSum  = attempted.reduce((s, t) => s + (t.seenCount || 0), 0);
                    const totalSum = attempted.reduce((s, t) => s + (t.totalQuestionsInBank || 0), 0);
                    mastery = totalSum > 0 ? Math.min(seenSum / totalSum * 100, 100) : 0;
                }
            }
            const mCls = mastery === null ? 'none' : mastery >= 70 ? 'high' : mastery >= 40 ? 'mid' : 'low';

            const rating = calcRating(p.id);
            const ratingCls = rating === null ? 'none' : rating >= 7 ? 'high' : rating >= 4 ? 'mid' : 'low';

            const star = hasTest && mastery >= 70 ? '⭐'
                : hasTest ? '<span style="color:#94a3b8;font-size:.9rem">★</span>'
                : sessions > 0 ? '<span style="color:rgba(255,255,255,.3);font-size:.9rem">★</span>'
                : '<span style="color:rgba(255,255,255,.12);font-size:.9rem">★</span>';

            // Tests detail table (collapsible) — placed under the paragraph name column
            let testsDetail = '';
            if (qids.length > 0) {
                const testRows = (p.tests || []).filter(t => t?.quizId).map(t => {
                    const td = tests[t.quizId];
                    const done = td && td.attemptsCount > 0;
                    const pass = done && td.bestScore >= 70;
                    const bCls = !done ? 'none' : pass ? 'pass' : 'fail';
                    const median = getMedian(t.quizId);
                    const mCls2 = median === null ? 'none' : median >= 70 ? 'pass' : 'fail';
                    const lastDate = done ? fmtDate(td.lastAttemptAt) : '—';
                    const testHref = `theory/${ch.id}/${ch.groupId}/${p.id}.html#tests`;
                    // srNextDue приходит с сервера — используем его напрямую
                    const repeatBadge = reviewBadge(srNextDue, done, testHref);
                    return `<a class="pt-test-row${done ? '' : ' pt-not-started'}" href="${testHref}">
                        <div class="pt-test-name">${td?.testTitle || t.title || t.quizId}</div>
                        <div class="pt-cell">${done ? td.attemptsCount : '—'}</div>
                        <div class="pt-cell">${lastDate}</div>
                        <div class="pt-cell"><span class="pt-score ${bCls}">${done ? td.bestScore+'%' : '—'}</span></div>
                        <div class="pt-cell"><span class="pt-score ${mCls2}">${median !== null ? median+'%' : '—'}</span></div>
                        <div class="pt-cell">${repeatBadge}</div>
                    </a>`;
                }).join('');

                const detailId = `tests-${ch.id}-${p.id}`;
                testsDetail = `
                    <div class="para-tests-detail" id="${detailId}" style="display:none">
                        <div class="pt-head-row">
                            <div style="text-align:left">Название теста</div>
                            <div>Попыток</div>
                            <div>Последняя дата</div>
                            <div>Лучший</div>
                            <div>Медиана</div>
                            <div>Повторить</div>
                        </div>
                        ${testRows}
                    </div>`;
            }

            const detailId = qids.length > 0 ? `tests-${ch.id}-${p.id}` : null;

            const paraTestHref = `theory/${ch.id}/${ch.groupId}/${p.id}.html#tests`;

            return `<div class="para-row-wrap">
                <div class="para-row-grid${sessions > 0 || hasTest ? '' : ' unread'}">
                    <div class="pr-star">${star}</div>
                    <div>
                        <a class="pr-name-link" href="theory/${ch.id}/${ch.groupId}/${p.id}.html">${p.title || p.id}</a>
                        ${detailId ? `<div class="para-tests-toggle" onclick="toggleParaTests('${detailId}')">
                            <span class="ptt-label">📋 тесты (${qids.length})</span>
                            <span class="ptt-arrow" id="arr-${detailId}">▶</span>
                        </div>` : ''}
                    </div>
                    <div class="pr-cell"><strong>${sessions > 0 ? sessions : '—'}</strong></div>
                    <div class="pr-cell"><strong>${totalSecs > 0 ? fmtTime(totalSecs) : '—'}</strong></div>
                    <div class="pr-cell">
                        ${mastery !== null
                            ? `<div class="mastery-wrap">
                                <div class="mastery-track"><div class="mastery-fill ${mCls}" style="width:${mastery}%"></div></div>
                                <span class="mastery-val ${mCls}">${mastery.toFixed(1)}%</span>
                               </div>`
                            : '<span style="color:var(--text-tertiary);font-size:.7rem">—</span>'}
                    </div>
                    <div class="pr-cell">${reviewBadge(srNextDue, hasTest, paraTestHref)}</div>
                    <div class="pr-cell pr-rating"><span class="ph-rating-val ${ratingCls}">${rating !== null ? rating.toFixed(1) : '—'}</span></div>
                </div>
                ${testsDetail}
            </div>`;
        }).join('');

        const tableHead = `<div class="para-table-head-row">
            <div></div>
            <div style="text-align:left">Параграф</div>
            <div>Читал</div>
            <div>Время</div>
            <div>Усвоение</div>
            <div>Повторить</div>
            <div>Рейтинг</div>
        </div>`;

        theoryHtml += `<div class="chapter-tile glass">
            <div class="chapter-tile-head open" onclick="toggleChapter(this)">
                <div class="chapter-tile-icon">${icon}</div>
                <div class="chapter-tile-info">
                    <div class="chapter-tile-name">Глава ${chapterNumFromId(ch.id)}. ${ch.title}</div>
                </div>
                ${jugSvg}
                <div class="ch-badges">${badges}</div>
                <div class="chapter-tile-arrow">▼</div>
            </div>
            <div class="chapter-body open">
                <div class="theory-dash">
                    ${tableHead}
                    ${rowsHtml || '<div style="padding:8px 14px;font-size:.8rem;color:var(--text-tertiary)">Нет параграфов</div>'}
                </div>
            </div>
        </div>`;
    });

    wrap.innerHTML = theoryHtml || '<div class="empty-state" style="padding:var(--space-6)"><p>Нет данных</p></div>';

    requestAnimationFrame(() => {
        if (window.gsap) {
            gsap.from(wrap.querySelectorAll('.chapter-tile'), { y:20, opacity:0, stagger:.07, duration:.45, ease:'power2.out' });
        }
    });
}
function toggleChapter(head) {
    const body = head.nextElementSibling;
    const arrow = head.querySelector('.chapter-tile-arrow');
    const isOpen = head.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    head.classList.toggle('open', !isOpen);
    if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
}

function toggleParaTests(id) {
    const el = document.getElementById(id);
    const arr = document.getElementById('arr-' + id);
    if (!el) return;
    const open = el.style.display === 'none';
    el.style.display = open ? 'block' : 'none';
    if (arr) arr.textContent = open ? '▼' : '▶';
}

function counter(id, target) {
    const el = document.getElementById(id);
    if (!el || !window.gsap) return;
    gsap.to({ v:0 }, { v:target, duration:.7, ease:'power2.out',
        onUpdate: function() { el.textContent = Math.round(this.targets()[0].v); }
    });
}

// ── Global context for lazy analytics ────────────────────────────────────────
let _analyticsCtx = null; // { isuNumber, chapters, progressMap }
let _analyticsLoaded = false;
let _analyticsLoading = false;
const ANALYTICS_TABS = new Set(['heatmap','mastery','scores','reading','distribution','weekly','improvement']);

// ── Tab switching (delegated, works with dynamically created tabs) ────────────
document.addEventListener('click', e => {
    const tab = e.target.closest('.profile-tab');
    if (!tab) return;
    const tabId = tab.dataset.tab;
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.toggle('active', t === tab));
    document.querySelectorAll('.tab-panel').forEach(p => {
        const isActive = p.id === 'tab-' + tabId;
        p.classList.toggle('active', isActive);
        p.style.display = isActive ? 'block' : 'none';
    });

    // Lazy load analytics on first click on any analytics tab
    if (ANALYTICS_TABS.has(tabId) && !_analyticsLoaded && !_analyticsLoading && _analyticsCtx) {
        _analyticsLoading = true;
        loadAnalyticsDashboards(_analyticsCtx.isuNumber, _analyticsCtx.chapters, _analyticsCtx.progressMap)
            .then(() => { _analyticsLoaded = true; _analyticsLoading = false; })
            .catch(() => { _analyticsLoading = false; });
    }
});

// ── Analytics dashboards ──────────────────────────────────────────────────────
async function loadAnalyticsDashboards(isuNumber, chapters, progressMap) {
    // Show loading state in all dashboard tabs immediately
    ['heatmap','mastery','scores','reading','distribution','weekly','improvement'].forEach(id => {
        const el = document.getElementById('tab-' + id);
        if (el && !el.innerHTML.trim()) {
            el.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">⏳</div><p>Загрузка...</p></div>';
        }
    });

    let analytics = null;
    try {
        const r = await fetch(`/api/analytics/${isuNumber}`);
        if (r.ok) {
            analytics = await r.json();
            console.log('[Analytics] loaded:', analytics);
        } else {
            console.warn('[Analytics] API returned', r.status, await r.text().catch(() => ''));
        }
    } catch(e) {
        console.error('[Analytics] fetch failed:', e);
    }
    if (!analytics) {
        // Show error state in all dashboard tabs
        ['heatmap','mastery','scores','reading','distribution','weekly','improvement'].forEach(id => {
            const el = document.getElementById('tab-' + id);
            if (el) el.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">📭</div><p>Нет данных аналитики</p><p style="font-size:.75rem;color:var(--text-tertiary);margin-top:8px">Пройдите тесты и почитайте теорию, чтобы здесь появилась статистика</p></div>';
        });
        return;
    }

    // Build paragraphId → title map from course structure
    const paraTitle = {};
    (chapters || []).forEach(ch => {
        (ch.paragraphs || []).forEach(p => { paraTitle[p.id] = p.title || p.id; });
    });

    const PIE_COLORS = ['#a78bfa','#7eb8f7','#6ee7b7','#fbbf24','#f87171','#fb923c','#34d399'];

    function fmtSecs(s) {
        if (!s) return '0м';
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
        return h > 0 ? `${h}ч ${m}м` : `${m}м`;
    }

    // Safe render wrapper — catches errors and shows them in the tab
    function safeRender(tabId, fn) {
        try { fn(); }
        catch(e) {
            console.error(`[Analytics] render error in tab-${tabId}:`, e);
            const el = document.getElementById('tab-' + tabId);
            if (el) el.innerHTML = `<div class="empty-state" style="padding:2rem"><div class="empty-icon">⚠️</div><p>Ошибка рендера</p><pre style="font-size:.65rem;color:var(--text-tertiary);margin-top:8px;white-space:pre-wrap">${e.message}</pre></div>`;
        }
    }

    // ── 1. HEATMAP — активность за 90 дней ───────────────────────────────────
    safeRender('heatmap', function() {
        const el = document.getElementById('tab-heatmap');
        if (!el) return;
        const data = analytics.heatmap || [];
        const map = {};
        data.forEach(d => { map[d.date] = d; });
        const maxXp = Math.max(...data.map(d => d.xp), 1);

        // Fill 90 days
        const cells = [];
        for (let i = 89; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0,10);
            const entry = map[key];
            const xp = entry?.xp || 0;
            const level = xp === 0 ? 0 : xp < maxXp * 0.25 ? 1 : xp < maxXp * 0.5 ? 2 : xp < maxXp * 0.75 ? 3 : 4;
            const tip = entry ? `${key}: ${xp} XP, ${entry.actions} действий` : key;
            cells.push(`<div class="heatmap-cell l${level}" title="${tip}"></div>`);
        }

        const totalDays = data.length;
        const totalXp   = data.reduce((s,d) => s + d.xp, 0);
        const streak    = (() => {
            let s = 0;
            for (let i = 0; i < 90; i++) {
                const d = new Date(); d.setDate(d.getDate() - i);
                if (map[d.toISOString().slice(0,10)]) s++; else break;
            }
            return s;
        })();

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">🔥 Активность за 90 дней</div>
                <div class="analytics-chips">
                    <div class="a-chip green"><div class="ac-val">${totalDays}</div><div class="ac-lbl">активных дней</div></div>
                    <div class="a-chip yellow"><div class="ac-val">${totalXp}</div><div class="ac-lbl">XP заработано</div></div>
                    <div class="a-chip blue"><div class="ac-val">${streak}</div><div class="ac-lbl">текущий стрик</div></div>
                </div>
                <div class="heatmap-grid">${cells.join('')}</div>
                <div class="heatmap-legend">
                    Меньше
                    <div class="heatmap-cell l0" style="width:11px;height:11px;border-radius:2px"></div>
                    <div class="heatmap-cell l1" style="width:11px;height:11px;border-radius:2px"></div>
                    <div class="heatmap-cell l2" style="width:11px;height:11px;border-radius:2px"></div>
                    <div class="heatmap-cell l3" style="width:11px;height:11px;border-radius:2px"></div>
                    <div class="heatmap-cell l4" style="width:11px;height:11px;border-radius:2px"></div>
                    Больше
                </div>
            </div>`;
    });

    // ── 2. MASTERY — усвоение по параграфам (горизонтальные бары) ────────────
    safeRender('mastery', function() {
        const el = document.getElementById('tab-mastery');
        if (!el) return;
        const data = analytics.masteryByParagraph || [];
        if (!data.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных</p></div>'; return; }

        const avgMastery = data.length ? Math.round(data.reduce((s,d) => s + d.mastery, 0) / data.length) : 0;
        const perfect    = data.filter(d => d.mastery === 100).length;
        const weak       = data.filter(d => d.mastery < 70).length;

        const rows = data.slice(0, 20).map(d => {
            const cls = d.mastery >= 70 ? 'green' : d.mastery >= 40 ? 'yellow' : 'red';
            const title = paraTitle[d.paragraphId] || d.paragraphId;
            return `<div class="bar-row">
                <div class="bar-label" title="${title}">${title}</div>
                <div class="bar-track"><div class="bar-fill ${cls}" style="width:${d.mastery}%"></div></div>
                <div class="bar-val" style="color:${d.mastery>=70?'#6ee7b7':d.mastery>=40?'#fbbf24':'#f87171'}">${d.mastery}%</div>
            </div>`;
        }).join('');

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">🎯 Усвоение по параграфам</div>
                <div class="analytics-chips">
                    <div class="a-chip blue"><div class="ac-val">${avgMastery}%</div><div class="ac-lbl">среднее</div></div>
                    <div class="a-chip green"><div class="ac-val">${perfect}</div><div class="ac-lbl">на 100%</div></div>
                    <div class="a-chip yellow"><div class="ac-val">${weak}</div><div class="ac-lbl">слабых</div></div>
                </div>
                <div class="bar-chart">${rows}</div>
            </div>`;
    });

    // ── 3. SCORES — результаты тестов во времени (timeline) ──────────────────
    safeRender('scores', function() {
        const el = document.getElementById('tab-scores');
        if (!el) return;
        const data = analytics.testTimeline || [];
        if (!data.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных</p></div>'; return; }

        const avg  = Math.round(data.reduce((s,d) => s + d.score, 0) / data.length);
        const best = Math.max(...data.map(d => d.score));
        const pass = data.filter(d => d.score >= 70).length;

        const bars = data.map(d => {
            const h = Math.max(4, Math.round(d.score * 0.76)); // max 76px
            const col = d.score >= 70 ? '#6ee7b7' : d.score >= 40 ? '#fbbf24' : '#f87171';
            const title = paraTitle[d.paragraphId] || d.paragraphId;
            return `<div class="score-bar-t" style="height:${h}px;background:${col};opacity:.85"
                data-tip="${d.date} · ${title} · ${d.score}%"></div>`;
        }).join('');

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">📈 Последние ${data.length} попыток</div>
                <div class="analytics-chips">
                    <div class="a-chip blue"><div class="ac-val">${avg}%</div><div class="ac-lbl">среднее</div></div>
                    <div class="a-chip green"><div class="ac-val">${best}%</div><div class="ac-lbl">лучший</div></div>
                    <div class="a-chip purple"><div class="ac-val">${pass}/${data.length}</div><div class="ac-lbl">зачтено</div></div>
                </div>
                <div style="font-size:.65rem;color:var(--text-tertiary);margin-bottom:6px">Наведите на столбец для деталей</div>
                <div class="score-timeline">${bars}</div>
                <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--text-tertiary);margin-top:4px">
                    <span>← старые</span><span>новые →</span>
                </div>
            </div>`;
    });

    // ── 4. READING — время чтения по главам (stacked bar) ────────────────────
    safeRender('reading', function() {
        const el = document.getElementById('tab-reading');
        if (!el) return;
        const readData = analytics.readingStats || [];
        if (!readData.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных</p></div>'; return; }

        // Group by chapter
        const byChapter = {};
        readData.forEach(r => {
            // Find chapter for this paragraph
            const ch = (chapters || []).find(c => (c.paragraphs||[]).some(p => p.id === r.paragraphId));
            const chIdx = ch ? chapters.indexOf(ch) : -1;
            const key = ch ? `Глава ${chapterNumFromId(ch.id)}` : 'Другое';
            if (!byChapter[key]) byChapter[key] = { secs: 0, sessions: 0, codeRuns: 0 };
            byChapter[key].secs     += r.totalReadingSeconds;
            byChapter[key].sessions += r.readingSessionsCount;
            byChapter[key].codeRuns += r.codeRunsCount;
        });

        const maxSecs = Math.max(...Object.values(byChapter).map(v => v.secs), 1);
        const totalSecs = Object.values(byChapter).reduce((s,v) => s + v.secs, 0);
        const totalSessions = Object.values(byChapter).reduce((s,v) => s + v.sessions, 0);
        const totalCode = Object.values(byChapter).reduce((s,v) => s + v.codeRuns, 0);

        const rows = Object.entries(byChapter).map(([key, v]) => `
            <div class="bar-row">
                <div class="bar-label">${key}</div>
                <div class="bar-track"><div class="bar-fill blue" style="width:${Math.round(v.secs/maxSecs*100)}%"></div></div>
                <div class="bar-val">${fmtSecs(v.secs)}</div>
            </div>`).join('');

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">⏱ Время чтения по главам</div>
                <div class="analytics-chips">
                    <div class="a-chip blue"><div class="ac-val">${fmtSecs(totalSecs)}</div><div class="ac-lbl">всего</div></div>
                    <div class="a-chip purple"><div class="ac-val">${totalSessions}</div><div class="ac-lbl">сессий</div></div>
                    <div class="a-chip green"><div class="ac-val">${totalCode}</div><div class="ac-lbl">запусков кода</div></div>
                </div>
                <div class="bar-chart">${rows}</div>
            </div>`;
    });

    // ── 5. DISTRIBUTION — гистограмма результатов ────────────────────────────
    safeRender('distribution', function() {
        const el = document.getElementById('tab-distribution');
        if (!el) return;
        const dist = analytics.scoreDistribution || [];
        const total = dist.reduce((s,d) => s + d.count, 0);
        if (!total) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных</p></div>'; return; }

        const maxCount = Math.max(...dist.map(d => d.count), 1);

        // SVG bar chart
        const W = 400, H = 120, pad = { l: 30, r: 10, t: 10, b: 30 };
        const bw = (W - pad.l - pad.r) / dist.length;
        const bars = dist.map((d, i) => {
            const bh = d.count > 0 ? Math.max(4, Math.round((d.count / maxCount) * (H - pad.t - pad.b))) : 0;
            const x = pad.l + i * bw + 2;
            const y = H - pad.b - bh;
            const col = i >= 7 ? '#6ee7b7' : i >= 4 ? '#fbbf24' : '#f87171';
            return `<rect x="${x}" y="${y}" width="${bw-4}" height="${bh}" rx="3" fill="${col}" opacity=".85">
                <title>${d.label}%: ${d.count} попыток</title>
            </rect>
            ${d.count > 0 ? `<text x="${x + (bw-4)/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.6)">${d.count}</text>` : ''}
            <text x="${x + (bw-4)/2}" y="${H-pad.b+12}" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.4)">${d.label.split('-')[0]}</text>`;
        }).join('');

        // Pie chart for pass/fail
        const passed = dist.slice(7).reduce((s,d) => s + d.count, 0);
        const failed = total - passed;
        const passAngle = passed / total * 360;
        function polarToXY(cx, cy, r, deg) {
            const rad = (deg - 90) * Math.PI / 180;
            return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
        }
        const cx = 50, cy = 50, r = 40;
        const [x1,y1] = polarToXY(cx,cy,r,0);
        const [x2,y2] = polarToXY(cx,cy,r,passAngle);
        const large = passAngle > 180 ? 1 : 0;
        const pieSvg = `<svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
            ${passed > 0 ? `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="#6ee7b7" opacity=".85"/>` : ''}
            ${failed > 0 ? `<path d="M${cx},${cy} L${x2},${y2} A${r},${r} 0 ${1-large},1 ${x1},${y1} Z" fill="#f87171" opacity=".75"/>` : ''}
            <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="10" font-weight="700" fill="white">${analytics.passRate}%</text>
        </svg>`;

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">📊 Распределение результатов</div>
                <div class="analytics-chips">
                    <div class="a-chip purple"><div class="ac-val">${total}</div><div class="ac-lbl">попыток</div></div>
                    <div class="a-chip blue"><div class="ac-val">${analytics.avgScore}%</div><div class="ac-lbl">среднее</div></div>
                    <div class="a-chip green"><div class="ac-val">${analytics.passRate}%</div><div class="ac-lbl">зачтено</div></div>
                </div>
                <div style="display:flex;gap:var(--space-6);flex-wrap:wrap;align-items:flex-start">
                    <div>
                        <div style="font-size:.65rem;color:var(--text-tertiary);margin-bottom:6px">Гистограмма по диапазонам</div>
                        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%">${bars}</svg>
                    </div>
                    <div>
                        <div style="font-size:.65rem;color:var(--text-tertiary);margin-bottom:6px">Зачёт / Незачёт</div>
                        <div class="pie-wrap">
                            ${pieSvg}
                            <div class="pie-legend">
                                <div class="pie-legend-item"><div class="pie-dot" style="background:#6ee7b7"></div>Зачтено: ${passed}</div>
                                <div class="pie-legend-item"><div class="pie-dot" style="background:#f87171"></div>Не зачтено: ${failed}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
    });

    // ── 6. WEEKLY — активность по неделям (сгруппированные бары) ─────────────
    safeRender('weekly', function() {
        const el = document.getElementById('tab-weekly');
        if (!el) return;
        const data = analytics.weeklyActivity || [];
        if (!data.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных</p></div>'; return; }

        const maxTests = Math.max(...data.map(d => d.tests), 1);
        const maxReads = Math.max(...data.map(d => d.reads), 1);
        const maxCode  = Math.max(...data.map(d => d.codeRuns), 1);
        const maxAll   = Math.max(maxTests, maxReads, maxCode);
        const H = 90;

        const groups = data.map(d => {
            const th = Math.max(2, Math.round(d.tests / maxAll * H));
            const rh = Math.max(2, Math.round(d.reads / maxAll * H));
            const ch = Math.max(2, Math.round(d.codeRuns / maxAll * H));
            const lbl = d.weekStart.slice(5); // MM-DD
            return `<div class="weekly-group" title="${d.weekStart}: ${d.tests} тестов, ${d.reads} чтений, ${d.codeRuns} кода">
                <div class="weekly-bars">
                    <div class="weekly-bar" style="height:${th}px;background:#a78bfa" title="Тесты: ${d.tests}"></div>
                    <div class="weekly-bar" style="height:${rh}px;background:#7eb8f7" title="Чтение: ${d.reads}"></div>
                    <div class="weekly-bar" style="height:${ch}px;background:#6ee7b7" title="Код: ${d.codeRuns}"></div>
                </div>
                <div class="weekly-lbl">${lbl}</div>
            </div>`;
        }).join('');

        const totalTests = data.reduce((s,d) => s + d.tests, 0);
        const totalReads = data.reduce((s,d) => s + d.reads, 0);
        const totalCode  = data.reduce((s,d) => s + d.codeRuns, 0);

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">📅 Активность по неделям (последние 12)</div>
                <div class="analytics-chips">
                    <div class="a-chip purple"><div class="ac-val">${totalTests}</div><div class="ac-lbl">тестов</div></div>
                    <div class="a-chip blue"><div class="ac-val">${totalReads}</div><div class="ac-lbl">чтений</div></div>
                    <div class="a-chip green"><div class="ac-val">${totalCode}</div><div class="ac-lbl">запусков кода</div></div>
                </div>
                <div class="weekly-chart">${groups}</div>
                <div style="display:flex;gap:12px;margin-top:8px;font-size:.65rem;color:var(--text-tertiary)">
                    <span><span style="display:inline-block;width:8px;height:8px;background:#a78bfa;border-radius:2px;margin-right:4px"></span>Тесты</span>
                    <span><span style="display:inline-block;width:8px;height:8px;background:#7eb8f7;border-radius:2px;margin-right:4px"></span>Чтение</span>
                    <span><span style="display:inline-block;width:8px;height:8px;background:#6ee7b7;border-radius:2px;margin-right:4px"></span>Код</span>
                </div>
            </div>`;
    });

    // ── 7. IMPROVEMENT — прогресс (первая vs лучшая попытка) ─────────────────
    safeRender('improvement', function() {
        const el = document.getElementById('tab-improvement');
        if (!el) return;
        const data = analytics.improvementData || [];
        if (!data.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Нет данных — пройдите тесты несколько раз</p></div>'; return; }

        const avgImprove = Math.round(data.reduce((s,d) => s + d.improvement, 0) / data.length);
        const maxImprove = Math.max(...data.map(d => d.improvement));

        const rows = data.map(d => {
            const title = paraTitle[d.paragraphId] || d.paragraphId;
            const firstW = d.firstScore;
            const bestW  = d.bestScore;
            const impCol = d.improvement >= 20 ? '#6ee7b7' : d.improvement >= 10 ? '#fbbf24' : '#7eb8f7';
            return `<div class="improve-row">
                <div class="improve-label" title="${title}">${title}</div>
                <div class="improve-score" style="color:#f87171">${d.firstScore}%</div>
                <div class="improve-track">
                    <div class="improve-first" style="width:${firstW}%"></div>
                    <div class="improve-best"  style="width:${bestW}%"></div>
                </div>
                <div class="improve-score" style="color:${impCol}">+${d.improvement}%</div>
            </div>`;
        }).join('');

        el.innerHTML = `
            <div class="dash-card-wrap">
                <div class="dash-card-title">🚀 Прогресс: первая → лучшая попытка</div>
                <div class="analytics-chips">
                    <div class="a-chip green"><div class="ac-val">+${avgImprove}%</div><div class="ac-lbl">среднее улучшение</div></div>
                    <div class="a-chip yellow"><div class="ac-val">+${maxImprove}%</div><div class="ac-lbl">максимум</div></div>
                    <div class="a-chip blue"><div class="ac-val">${data.length}</div><div class="ac-lbl">тестов улучшено</div></div>
                </div>
                <div style="font-size:.65rem;color:var(--text-tertiary);margin-bottom:8px">
                    <span style="display:inline-block;width:10px;height:6px;background:rgba(248,113,113,.5);border-radius:2px;margin-right:4px"></span>Первая попытка
                    <span style="display:inline-block;width:10px;height:6px;background:linear-gradient(90deg,#6ee7b7,#3b82f6);border-radius:2px;margin:0 4px 0 12px"></span>Лучший результат
                </div>
                ${rows}
            </div>`;
    });
}
</script>
    <script src="components/theme/theme.js"></script>
    <script src="components/gamification/streak.js"></script>
</body>
</html>
