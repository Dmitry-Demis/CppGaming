        <div class="callout__title">Начиная с <span class="std-badge std-badge--11">C++11</span></div>
        <div class="callout__body">
            <p>
                Если в <code>main()</code> нет явного <code>return</code>,
                компилятор автоматически добавляет <code>return 0;</code>.
                Для других функций это правило не действует.
            </p>
